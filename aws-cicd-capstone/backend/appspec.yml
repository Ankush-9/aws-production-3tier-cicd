version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Navigating deep into the backend folder..."
      # Added the repo name prefix here:
      - cd aws-production-3tier-cicd/aws-cicd-capstone/backend
      - echo "Installing application dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Making deployment scripts executable..."
      # Added the repo name prefix here:
      - chmod +x aws-production-3tier-cicd/aws-cicd-capstone/scripts/*.sh || chmod +x aws-production-3tier-cicd/aws-cicd-capstone/backend/scripts/*.sh || echo "Scripts permissions adjusted"

  build:
    commands:
      - echo "Running build or test configurations if required..."

  post_build:
    commands:
      - echo "Build complete. Injecting CodeDeploy configurations into the backend production bundle..."
      # Added the repo name prefix here so the files copy successfully:
      - cp aws-production-3tier-cicd/aws-cicd-capstone/appspec.yml aws-production-3tier-cicd/aws-cicd-capstone/backend/ || { echo "Failed to copy appspec.yml"; exit 1; }
      - cp -R aws-production-3tier-cicd/aws-cicd-capstone/scripts/ aws-production-3tier-cicd/aws-cicd-capstone/backend/ || { echo "Failed to copy scripts directory"; exit 1; }

artifacts:
  files:
    - '**/*'
  # Added the repo name prefix here so CodeBuild knows exactly what to zip up:
  base-directory: aws-production-3tier-cicd/aws-cicd-capstone/backend
  discard-paths: no

cache:
  paths:
    # Added the repo name prefix here so your cache functions properly:
    - 'aws-production-3tier-cicd/aws-cicd-capstone/backend/node_modules/**/*'
