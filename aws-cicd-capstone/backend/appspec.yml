version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Navigating to the backend directory..."
      - cd aws-cicd-capstone/backend
      - echo "Installing application dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Making deployment scripts executable..."
      - chmod +x aws-cicd-capstone/scripts/*.sh || chmod +x aws-cicd-capstone/backend/scripts/*.sh || echo "Scripts permissions adjusted"

  build:
    commands:
      - echo "Running build or test configurations if required..."

  post_build:
    commands:
      - echo "Build complete. Injecting CodeDeploy configurations into the backend production bundle..."
      - cp aws-cicd-capstone/appspec.yml aws-cicd-capstone/backend/ || { echo "Failed to copy appspec.yml"; exit 1; }
      - cp -R aws-cicd-capstone/scripts/ aws-cicd-capstone/backend/ || { echo "Failed to copy scripts directory"; exit 1; }

artifacts:
  files:
    - '**/*'
  base-directory: aws-cicd-capstone/backend
  discard-paths: no

cache:
  paths:
    # UPDATED: Now points to the correct location to save your node_modules between builds
    - 'aws-cicd-capstone/backend/node_modules/**/*'
