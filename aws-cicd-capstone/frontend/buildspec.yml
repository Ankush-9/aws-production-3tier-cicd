version: 0.2

env:
  variables:
    VITE_API_URL: "/api"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Navigating to frontend directory..."
      - cd aws-cicd-capstone/frontend
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Creating .env file inside frontend directory..."
      - echo "VITE_API_URL=\"$VITE_API_URL\"" > aws-cicd-capstone/frontend/.env
      - echo "Environment variables successfully saved."

  build:
    commands:
      - echo "Building React app..."
      - cd aws-cicd-capstone/frontend
      - npm run build

  post_build:
    commands:
      - echo "Injecting CodeDeploy configuration files..."

      - cp aws-cicd-capstone/appspec.yml aws-cicd-capstone/frontend/dist/ || { echo "Failed to copy appspec.yml"; exit 1; }

      - cp -R aws-cicd-capstone/scripts aws-cicd-capstone/frontend/dist/ || { echo "Failed to copy scripts directory"; exit 1; }

artifacts:
  files:
    - '**/*'
  base-directory: aws-cicd-capstone/frontend/dist
  discard-paths: no

cache:
  paths:
    - 'aws-cicd-capstone/frontend/node_modules/**/*'
