version: 0.2

env:
  variables:
    VITE_API_URL: "/api"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Navigating to the nested frontend directory..."
      - cd aws-production-3tier-cicd/aws-cicd-capstone/frontend
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Creating .env file inside the frontend directory..."
      - echo "VITE_API_URL=\"$VITE_API_URL\"" > aws-production-3tier-cicd/aws-cicd-capstone/frontend/.env
      - echo "Environment variables successfully saved."

  build:
    commands:
      - echo "Navigating to frontend and building the React app..."
      - cd aws-production-3tier-cicd/aws-cicd-capstone/frontend
      - npm run build

  post_build:
    commands:
      - echo "Build completed. Injecting CodeDeploy configurations into the production bundle..."
      # Copies deployment configs from the nested capstone folder into the built distribution directory
      - cp aws-production-3tier-cicd/aws-cicd-capstone/appspec.yml aws-production-3tier-cicd/aws-cicd-capstone/frontend/dist/ || { echo "Failed to copy appspec.yml"; exit 1; }
      - cp -R aws-production-3tier-cicd/aws-cicd-capstone/scripts/ aws-production-3tier-cicd/aws-cicd-capstone/frontend/dist/ || { echo "Failed to copy scripts directory"; exit 1; }

artifacts:
  files:
    - '**/*'
  base-directory: aws-production-3tier-cicd/aws-cicd-capstone/frontend/dist
  discard-paths: no

cache:
  paths:
    - 'aws-production-3tier-cicd/aws-cicd-capstone/frontend/node_modules/**/*'  files:
    - '**/*'
  # Tells CodeBuild exactly where to grab the compiled artifacts from
  base-directory: aws-cicd-capstone/frontend/dist
  discard-paths: no

cache:
  paths:
    - 'aws-cicd-capstone/frontend/node_modules/**/*'
