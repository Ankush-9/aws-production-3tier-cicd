version: 0.0
os: linux
files:
  - source: /
    destination: /usr/share/nginx/html  # Places compiled React assets into Nginx html root
    overwrite: true
hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh  # Cleans up old web assets before dropping new ones
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/restart_nginx.sh  # Restarts Nginx to apply changes
      timeout: 300
      runas: root
