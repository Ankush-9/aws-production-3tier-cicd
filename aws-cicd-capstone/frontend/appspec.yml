version: 0.0
os: linux
files:
  - source: /
    destination: /usr/share/nginx/html  # Path where Nginx serves your production build
    overwrite: true

hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh  # Script executing relative to the artifact root
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/restart_nginx.sh  # Script to cleanly reload/restart Nginx
      timeout: 300
      runas: root
